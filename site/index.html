<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocross RATING - National Driver Ratings</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=15">
</head>
<body>
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <header>
    <a href="https://autox.tools" class="site-home" title="autox.tools">autox<span class="dot">.</span>tools</a>
    <div class="header-content">
      <h1><a href="#/">autocross <span class="accent">rating</span></a></h1>
      <p class="subtitle">relative autocross time index normalized grade</p>
    </div>
    <nav>
      <a href="#/" class="nav-link active" data-page="rankings">Ratings</a>
      <a href="#/events" class="nav-link" data-page="events">Events</a>
      <a href="#/about" class="nav-link" data-page="about">About</a>
      <div class="search-container">
        <input type="text" id="global-search" placeholder="Search drivers..." autocomplete="off">
        <div id="search-results" class="search-dropdown"></div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">☀️</button>
    </nav>
  </header>

  <main id="app">
    <!-- Content loaded dynamically -->
    <div class="loading">Loading...</div>
  </main>

  <footer>
    <p>Data sourced from <a href="https://www.scca.com" target="_blank">SCCA</a> national events. Updated automatically.</p>
    <p id="last-updated"></p>
  </footer>

  <script src="js/utils.js?v=15"></script>
  <script src="js/search.js?v=15"></script>
  <script src="js/rankings.js?v=15"></script>
  <script src="js/driver.js?v=15"></script>
  <script src="js/event.js?v=15"></script>
  <script src="js/app.js?v=15"></script>
</body>
</html>
