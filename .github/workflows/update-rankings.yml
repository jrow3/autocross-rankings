name: Update Autocross Rankings

on:
  # Run weekly on Tuesday morning (after weekend events)
  schedule:
    - cron: '0 10 * * 2'
  # Manual trigger
  workflow_dispatch:
    inputs:
      full_discovery:
        description: 'Re-discover all historical years (not just current/next)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      # Only discover current + next year for weekly updates (historical events don't change)
      - name: Discover events (current + next year)
        working-directory: scraper
        run: node src/scraper.js discover $(date +%Y),$(( $(date +%Y) + 1 ))
        env:
          INSECURE_VAULT_SKIP_CERT: '1'

      # Full historical re-discovery (manual trigger only, use "full_discovery" input)
      - name: Discover all historical events
        if: github.event.inputs.full_discovery == 'true'
        working-directory: scraper
        run: node src/scraper.js discover
        env:
          INSECURE_VAULT_SKIP_CERT: '1'

      - name: Scrape all events
        working-directory: scraper
        run: node src/scraper.js all
        env:
          INSECURE_VAULT_SKIP_CERT: '1'

      - name: Build driver registry
        working-directory: scraper
        run: node src/driver-registry.js

      - name: Compute rankings
        working-directory: scraper
        run: node src/rank-algorithm.js

      - name: Generate frontend data
        working-directory: scraper
        run: node src/generate-output.js

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scraper/data/ site/data/ site/.ftp-deploy-sync-state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update rankings data $(date +%Y-%m-%d)"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
