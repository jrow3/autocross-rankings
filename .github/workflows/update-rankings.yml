name: Update Autocross Rankings

on:
  # Run weekly on Monday morning (after weekend events)
  schedule:
    - cron: '0 10 * * 1'
  # Manual trigger
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Discover events
        working-directory: scraper
        run: node src/scrape-vault.js discover

      - name: Scrape all events
        working-directory: scraper
        run: node src/scrape-vault.js all

      - name: Build driver registry
        working-directory: scraper
        run: node src/driver-registry.js

      - name: Compute rankings
        working-directory: scraper
        run: node src/rank-algorithm.js

      - name: Generate frontend data
        working-directory: scraper
        run: node src/generate-output.js

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: djrow3.com
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./site/
          server-dir: /djrow3.com/dump/autoxrating/

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scraper/data/ site/data/
          git diff --staged --quiet || git commit -m "Update rankings data $(date +%Y-%m-%d)"
          git push
